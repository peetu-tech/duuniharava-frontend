async function initDashboard() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
        window.location.href = 'login.html';
        return;
    }
    const userEmail = session.user.email;
    document.getElementById('user-email').innerText = "Käyttäjä: " + userEmail;
    
    // Haetaan osumat ja mahdollinen analyysi
    fetchWeeklyMatches(userEmail);
    fetchLatestAnalysis(userEmail);
}

// UUSI: Haetaan CV-analyysin tulokset tietokannasta
async function fetchLatestAnalysis(email) {
    const { data, error } = await supabaseClient
        .from('cv_analyses')
        .select('*')
        .eq('customer_id', email)
        .order('created_at', { ascending: false })
        .limit(1)
        .single();

    if (data) {
        document.getElementById('analysis-result').classList.remove('hidden');
        document.getElementById('report-content').innerText = data.analysis_text;
        document.getElementById('score-circle').innerText = data.score + "%";
        document.getElementById('score-circle').style.borderColor = data.score > 70 ? '#00BFA6' : '#FF6F3C';
        document.getElementById('doc-link').href = data.google_doc_url || "#";
    }
}

// CV:n lähetys n8n-webhookiin
document.getElementById('submit-cv-btn').onclick = async function() {
    const fileInput = document.getElementById('cv-file');
    const file = fileInput.files[0];
    if (!file) { alert("Valitse PDF-tiedosto."); return; }

    const btn = this;
    btn.disabled = true;
    document.getElementById('form-fields').classList.add('hidden');
    document.getElementById('loading-state').classList.remove('hidden');

    const reader = new FileReader();
    reader.onload = async function() {
        const base64File = reader.result.split(',')[1];
        const { data: { session } } = await supabaseClient.auth.getSession();

        const payload = {
            email: session.user.email,
            fileName: file.name,
            fileBase64: base64File,
            achievements: document.getElementById('extra-achievements').value,
            target: document.getElementById('extra-target').value,
            skills: document.getElementById('extra-skills').value
        };

        try {
            // HUOM: Vaihda tähän oikea n8n-webhook URL CV-analyysia varten
            const response = await fetch('https://n8nscalera.eu/webhook/ANALYYSI_ID', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("CV lähetetty analysoitavaksi! Tulokset ilmestyvät hetken kuluttua.");
                closeCvModal();
            }
        } catch (err) {
            alert("Virhe lähetyksessä.");
        } finally {
            btn.disabled = false;
            document.getElementById('form-fields').classList.remove('hidden');
            document.getElementById('loading-state').classList.add('hidden');
        }
    };
    reader.readAsDataURL(file);
};

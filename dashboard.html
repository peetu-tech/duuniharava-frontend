<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Duuniharava</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0F0F0F; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .turkoosi-text { color: #00BFA6; }
        .oranssi-text { color: #FF6F3C; }
        .modal-hidden { display: none !important; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0, 191, 166, 0.1); border-left-color: #00BFA6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        .spinner-sm { width: 16px; height: 16px; border: 2px solid rgba(255, 255, 255, 0.2); border-left-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .line-clamp-4 { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div class="font-bold text-xl tracking-tighter">
                <span class="turkoosi-text">DUUNI</span><span class="oranssi-text">HARAVA</span>
            </div>
            <button id="logout-btn" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg transition uppercase font-bold tracking-widest">KIRJAUDU ULOS</button>
        </header>

        <div class="glass p-8 rounded-[2rem] mb-12">
            <h1 class="text-3xl font-bold mb-2">Tervetuloa takaisin!</h1>
            <p id="user-email" class="text-gray-400 font-mono text-sm">Ladataan...</p>
        </div>

        <div id="analysis-result" class="glass p-8 rounded-[2rem] mb-12 hidden border-t-4 border-[#00BFA6]">
            <div class="flex flex-col md:flex-row gap-8 items-start">
                <div id="score-container" class="flex-shrink-0 flex flex-col items-center bg-white/5 p-6 rounded-3xl border border-white/10 w-full md:w-48 text-center">
                    <div id="score-circle" class="w-24 h-24 rounded-full border-8 flex items-center justify-center text-2xl font-black mb-2 border-[#00BFA6]">0%</div>
                    <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">CV:n Laatu</span>
                </div>
                <div class="flex-grow">
                    <h2 class="text-2xl font-bold mb-4 uppercase tracking-tighter turkoosi-text">Tekoälyn analyysi</h2>
                    <div id="report-content" class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap mb-6"></div>
                    <a id="doc-link" href="#" target="_blank" class="inline-block bg-[#00BFA6] text-black px-8 py-4 rounded-2xl transition font-black text-xs uppercase tracking-widest">AVAA OPTIMOITU CV ➔</a>
                </div>
            </div>
        </div>

        <section class="mb-12">
            <h2 class="text-sm font-black uppercase tracking-[0.3em] text-gray-500 mb-8 px-4">Viikon Haravointi</h2>
            <div id="job-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center py-12 opacity-50"><div class="spinner"></div></div>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-[#00BFA6]">
                <h3 class="font-bold text-xl mb-4">1. Optimoi CV</h3>
                <button onclick="openCvModal()" class="w-full py-4 rounded-xl bg-[#00BFA6] text-black font-black tracking-widest uppercase hover:scale-105 transition">Aloita tästä</button>
            </div>
            <div class="glass p-8 rounded-[2.5rem] border-t-4 border-purple-500">
                <h3 class="font-bold text-xl mb-4">2. Aktivoi Haku</h3>
                <button onclick="openSearchModal()" class="w-full py-4 rounded-xl border border-purple-500/50 text-white font-black tracking-widest uppercase hover:bg-purple-500 transition">Käynnistä haku</button>
            </div>
        </div>
    </div>

    <div id="cv-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal-hidden">
        <div class="glass max-w-2xl w-full p-8 rounded-[2.5rem] border border-white/10 relative">
            <button onclick="closeCvModal()" class="absolute top-6 right-6 text-gray-500 hover:text-white">✕</button>
            <div id="form-fields">
                <h2 class="text-2xl font-bold mb-6 uppercase tracking-tighter">Lataa ja Analysoi CV</h2>
                <input type="file" id="cv-file" accept=".pdf" class="mb-6 block w-full text-sm text-gray-400">
                <button id="submit-cv-btn" class="w-full bg-gradient-to-r from-[#00BFA6] to-[#FF6F3C] text-black font-black py-4 rounded-xl uppercase tracking-widest text-xs">ANALYSOI NYT ➔</button>
            </div>
            <div id="loading-state" class="hidden py-12 text-center">
                <div class="spinner"></div>
                <h3 class="font-bold animate-pulse">TEKOÄLY ANALYSOI...</h3>
            </div>
        </div>
    </div>

    <script>
        const config = {
            url: 'https://zxtnhitxachrudrcrotk.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dG5oaXR4YWNocnVkcmNyb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODEwOTUsImV4cCI6MjA4Nzg1NzA5NX0.DPXJlYDI2L8oLYo6ofyPJzQDTbXAhreJx7VsqhV7VdI'
        };
        const supabaseClient = window.supabase.createClient(config.url, config.key);

        async function initDashboard() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            
            const userEmail = session.user.email;
            document.getElementById('user-email').innerText = "Käyttäjä: " + userEmail;
            
            fetchWeeklyMatches(userEmail);
            fetchLatestAnalysis(userEmail);
        }

        async function fetchWeeklyMatches(email) {
            const { data, error } = await supabaseClient.from('matches').select('*').eq('customer_id', email).order('created_at', { ascending: false });
            const jobList = document.getElementById('job-list');
            if (error || !data || data.length === 0) {
                jobList.innerHTML = '<p class="col-span-full text-center text-gray-500">Ei vielä hakuja.</p>';
                return;
            }
            jobList.innerHTML = data.map(match => `
                <div class="glass p-6 rounded-[2rem] border border-[#00BFA6]/10">
                    <span class="text-[10px] font-black text-[#00BFA6] uppercase">${match.match_percent}% Match</span>
                    <h3 class="text-xl font-bold mt-2">${match.job_title}</h3>
                    <p class="text-sm text-gray-400 mb-4">${match.company}</p>
                    <p class="text-xs text-gray-500 line-clamp-4">${match.reasoning}</p>
                </div>
            `).join('');
        }

        async function fetchLatestAnalysis(email) {
            const { data } = await supabaseClient.from('cv_analyses').select('*').eq('customer_id', email).order('created_at', { ascending: false }).limit(1).single();
            if (data) {
                document.getElementById('analysis-result').classList.remove('hidden');
                document.getElementById('report-content').innerText = data.analysis_text;
                document.getElementById('score-circle').innerText = data.score + "%";
                document.getElementById('doc-link').href = data.google_doc_url || "#";
            }
        }

        document.getElementById('logout-btn').onclick = async () => { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; };
        function openCvModal() { document.getElementById('cv-modal').classList.remove('modal-hidden'); }
        function closeCvModal() { document.getElementById('cv-modal').classList.add('modal-hidden'); }

        initDashboard();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duuniharava | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0B0B0B; color: #FFFFFF; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .glass:hover { border-color: rgba(0, 191, 166, 0.4); transform: translateY(-4px); }
        .turkoosi-text { color: #00BFA6; }
        .btn-primary { background: #00BFA6; color: #000; font-weight: bold; }
        .btn-outline { border: 1px solid #FFFFFF; color: #FFFFFF; }
        .btn-primary:disabled, .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-16">
        <div class="text-xl font-bold tracking-tighter">
            <span class="turkoosi-text">DUUNI</span><span class="text-orange-500">HARAVA</span>
        </div>
        <button onclick="logout()" class="text-xs font-bold border border-red-500/50 text-red-500 px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">
            KIRJAUDU ULOS
        </button>
    </nav>

    <main class="max-w-4xl mx-auto">
        <div class="glass p-8 rounded-[2.5rem] mb-12">
            <h1 class="text-3xl font-bold mb-2">Tervetuloa takaisin!</h1>
            <p class="text-gray-500 font-mono text-sm">Käyttäjä: <span id="user-email" class="text-gray-300">ladataan...</span></p>
        </div>

        <h2 class="text-xs font-bold tracking-[0.2em] text-gray-500 uppercase mb-8">Viikon Haravointi</h2>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="glass p-8 rounded-[2.5rem] flex flex-col justify-between">
                <div>
                    <h3 class="text-xl font-bold mb-2">1. Optimoi CV</h3>
                    <p class="text-gray-400 text-sm mb-8">Lähetä nykyinen CV:si tekoälylle analysoitavaksi ja optimoitavaksi.</p>
                </div>
                <button onclick="aloitaCVOptimointi(event)" class="btn-primary py-4 px-6 rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition">
                    ALOITA TÄSTÄ
                </button>
            </div>

            <div class="glass p-8 rounded-[2.5rem] flex flex-col justify-between border-purple-500/20">
                <div>
                    <h3 class="text-xl font-bold mb-2 text-white">2. Aktivoi Haku</h3>
                    <p class="text-gray-400 text-sm mb-8">Seuraa n8n-botin tekemiä hakemuksia ja niiden tilaa.</p>
                </div>
                <button onclick="aktivoiHaku(event)" class="btn-outline py-4 px-6 rounded-2xl hover:bg-white hover:text-black transition">
                    KÄYNNISTÄ HAKU
                </button>
            </div>
        </div>
    </main>

    <script>
        // 1. Supabase Alustus
        const SUPABASE_URL = 'https://zxtnhitxachrudrcrotk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dG5oaXR4YWNocnVkcmNyb3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyODEwOTUsImV4cCI6MjA4Nzg1NzA5NX0.DPXJlYDI2L8oLYo6ofyPJzQDTbXAhreJx7VsqhV7VdI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. n8n Webhookit
        const CV_BOTTI_URL = 'https://n8nscalera.eu/webhook/uusi-hakemus';
        const VIIKKO_HARAVA_URL = 'https://n8nscalera.eu/webhook/dbf6d297-1d27-4d24-839d-bb98ebc87cc4';

        // TARKISTA KIRJAUTUMINEN
        async function checkUser() {
            const { data: { user }, error } = await supabaseClient.auth.getUser();
            if (error || !user) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('user-email').innerText = user.email;
            }
        }

        // CV OPTIMOINTI (Botti 1)
        async function aloitaCVOptimointi(event) {
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            const { data: { user } } = await supabaseClient.auth.getUser();

            btn.innerText = "YHDISTETÄÄN...";
            btn.disabled = true;

            try {
                await fetch(CV_BOTTI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'no-cors',
                    body: JSON.stringify({
                        email: user.email,
                        userId: user.id,
                        type: 'cv_optimization'
                    })
                });
                alert("CV-botti käynnistetty! n8n aloittaa käsittelyn.");
            } catch (err) {
                console.error(err);
                alert("Yhteysvirhe n8n-palvelimeen.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // VIIKKO HARAVA (Botti 2)
        async function aktivoiHaku(event) {
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            const { data: { user } } = await supabaseClient.auth.getUser();

            btn.innerText = "KÄYNNISTETÄÄN...";
            btn.disabled = true;

            try {
                await fetch(VIIKKO_HARAVA_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    mode: 'no-cors',
                    body: JSON.stringify({
                        email: user.email,
                        userId: user.id,
                        action: 'activate_search_bot'
                    })
                });
                alert("Viikko-Harava on nyt aktivoitu ja etsii työpaikkoja!");
            } catch (err) {
                console.error(err);
                alert("Virhe haun käynnistyksessä.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // ULOSKIRJAUTUMINEN
        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        // Käynnistä tarkistus
        checkUser();
    </script>
</body>
</html>
